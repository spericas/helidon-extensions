openapi: "3.0.0"
info:
  version: 1.0.0
  title: Global Secured API
servers:
  - url: http://localhost:8080
security:
  - basicAuth: ["admin"]
paths:
  /items:
    get:
      summary: List items (inherits global security)
      operationId: listItems
      tags:
        - items
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Item"
  /public-items:
    post:
      summary: Create public item (explicitly unsecured)
      operationId: createPublicItem
      tags:
        - items
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Item"
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Item"
components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
  schemas:
    Item:
      required:
        - id
        - name
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
