openapi: "3.0.3"
info:
  title: Optional Header Test API
  version: "1.0"
paths:
  /reports:
    get:
      summary: Get report
      operationId: getReport
      tags:
        - reports
      parameters:
        - name: opc-request-id
          in: header
          required: false
          schema:
            type: string
        - name: includeDetails
          in: query
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: OK
          content:
            text/plain:
              schema:
                type: string
