---
openapi: "3.0.0"
info:
  version: 1.0.0
  title: Secured API
servers:
  - url: http://localhost:8080
paths:
  /items:
    get:
      summary: List items (public)
      operationId: listItems
      tags:
        - items
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Item"
    post:
      summary: Create item (admin only)
      operationId: createItem
      tags:
        - items
      security:
        - basicAuth: ["admin"]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Item"
      responses:
        '201':
          description: Created
  /items/{itemId}:
    delete:
      summary: Delete item (admin or moderator)
      operationId: deleteItem
      tags:
        - items
      security:
        - basicAuth: ["admin", "moderator"]
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: No content
components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
  schemas:
    Item:
      required:
        - id
        - name
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
