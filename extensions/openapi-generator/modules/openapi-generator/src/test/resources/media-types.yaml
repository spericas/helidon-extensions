openapi: "3.0.0"
info:
  title: Media Types Test API
  version: "1.0"
servers:
  - url: http://example.com/v1
paths:
  /reports/plain:
    get:
      summary: Plain-text report
      operationId: getPlainReport
      tags:
        - reports
      responses:
        "200":
          description: Plain report
          content:
            text/plain:
              schema:
                type: string
  /reports/export:
    get:
      summary: CSV export
      operationId: exportReport
      tags:
        - reports
      responses:
        "200":
          description: CSV report
          content:
            text/csv:
              schema:
                type: string
