---
openapi: "3.0.3"
info:
  title: Validation Private Field Reproducer
  version: "1.0.0"
servers:
  - url: http://example.com/v1
paths:
  /guardrailsOperations:
    post:
      summary: Create guardrails operation
      operationId: createGuardrailsOperation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGuardrailsOperationDetails'
      responses:
        "200":
          description: OK
components:
  schemas:
    CreateGuardrailsOperationDetails:
      type: object
      required:
        - compartmentId
        - sourceDetails
      properties:
        compartmentId:
          description: Compartment Identifier for the new GuardrailsOperation
          type: string
          minLength: 1
          maxLength: 255
        name:
          description: The name of the GuardrailsOperation.
          type: string
          minLength: 1
          maxLength: 255
        serialEvaluationKey:
          description: The key used to serialize different GuardrailsOperation evaluations.
          type: string
          minLength: 1
          maxLength: 255
        sourceDetails:
          $ref: '#/components/schemas/CreateOperationSourceDetails'

    CreateOperationSourceDetails:
      type: object
      required:
        - source
      properties:
        source:
          type: string
