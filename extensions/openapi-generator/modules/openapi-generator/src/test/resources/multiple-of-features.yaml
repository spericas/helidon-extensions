openapi: "3.0.0"
info:
  title: Multiple Of Features API
  version: "1.0"
paths:
  /rules:
    get:
      summary: List rules
      operationId: listRules
      tags:
        - rules
      parameters:
        - name: step
          in: query
          required: false
          schema:
            type: integer
            format: int32
            multipleOf: 5
        - name: longStep
          in: query
          required: false
          schema:
            type: integer
            format: int64
            multipleOf: 10
        - name: priceStep
          in: query
          required: false
          schema:
            type: number
            format: double
            multipleOf: 0.25
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Rule'
components:
  schemas:
    Rule:
      type: object
      properties:
        id:
          type: integer
          format: int64
