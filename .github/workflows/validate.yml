name: "Validate"

on:
  pull_request:
#  push:
#    branches-ignore: [ 'main', 'release-*' ]
#    tags-ignore: [ '**' ]
  workflow_call:
    inputs:
      ref:
        description: The branch, tag or SHA to checkout
        required: false
        type: string
        default: ''

env:
  MVN_VERSION: 3.9.9
  JAVA_VERSION: 21
  JAVA_DISTRO: oracle
  MVN_ARGS: |
    -B -fae -e
    -Dmaven.wagon.httpconnectionManager.ttlSeconds=60
    -Dmaven.wagon.http.retryHandler.count=3
    -Djdk.toolchain.version=${JAVA_VERSION}
    -Dcache.enabled=true

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    timeout-minutes: 5
    runs-on: ubuntu-22.04
    outputs:
      neo4j: ${{ steps.filter.outputs.neo4j }}
      hashicorp_vault: ${{ steps.filter.outputs.hashicorp_vault }}
      oci_v3: ${{ steps.filter.outputs.oci_v3 }}
      lc4j: ${{ steps.filter.outputs.lc4j }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0
      - id: filter
        shell: bash
        run: |
          set -euo pipefail

          run_all=false
          base=""
          head=""

          case "${{ github.event_name }}" in
            workflow_call)
              run_all=true
              ;;
            pull_request)
              base="${{ github.event.pull_request.base.sha }}"
              head="${{ github.event.pull_request.head.sha }}"
              ;;
            push)
              base="${{ github.event.before }}"
              head="${{ github.sha }}"
              if [ "${base}" = "0000000000000000000000000000000000000000" ]; then
                run_all=true
              fi
              ;;
            *)
              run_all=true
              ;;
          esac

          changed_files=""
          if [ "${run_all}" = "false" ]; then
            changed_files="$(git diff --name-only "${base}" "${head}")"
            printf 'Changed files:\n%s\n' "${changed_files}"

            if printf '%s\n' "${changed_files}" | grep -Eq \
              '^(pom\.xml|\.github/|etc/|licensing/|copyright-(failures\.txt|update\.sh)$)'; then
              run_all=true
            fi
          fi

          neo4j=false
          hashicorp_vault=false
          oci_v3=false
          lc4j=false

          if [ "${run_all}" = "true" ]; then
            neo4j=true
            hashicorp_vault=true
            oci_v3=true
            lc4j=true
          else
            if printf '%s\n' "${changed_files}" | grep -Eq '^neo4j/'; then
              neo4j=true
            fi
            if printf '%s\n' "${changed_files}" | grep -Eq '^hashicorp-vault/'; then
              hashicorp_vault=true
            fi
            if printf '%s\n' "${changed_files}" | grep -Eq '^oci-v3/'; then
              oci_v3=true
            fi
            if printf '%s\n' "${changed_files}" | grep -Eq '^langchain4j/'; then
              lc4j=true
            fi
          fi

          {
            echo "neo4j=${neo4j}"
            echo "hashicorp_vault=${hashicorp_vault}"
            echo "oci_v3=${oci_v3}"
            echo "lc4j=${lc4j}"
          } >> "${GITHUB_OUTPUT}"
  prime-build:
    needs: changes
    if: ${{ needs.changes.outputs.neo4j == 'true' || needs.changes.outputs.hashicorp_vault == 'true' || needs.changes.outputs.oci_v3 == 'true' || needs.changes.outputs.lc4j == 'true' }}
    timeout-minutes: 30
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0
      - name: Helidon Priming build
        uses: ./.github/actions/common
        with:
          free-space: true
          build-cache: read-write
          maven-cache: read-write
          run: |
            etc/scripts/prime-build.sh
  copyright:
    timeout-minutes: 5
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0
      - uses: ./.github/actions/common
        with:
          run: etc/scripts/copyright.sh
  checkstyle:
    needs: [ prime-build ]
    timeout-minutes: 5
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
      - uses: ./.github/actions/common
        with:
          run: etc/scripts/checkstyle.sh
  shellcheck:
    timeout-minutes: 5
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
      - uses: ./.github/actions/common
        with:
          maven-cache: none
          run: etc/scripts/shellcheck.sh
  neo4j:
    needs: [ prime-build, changes ]
    if: ${{ needs.changes.outputs.neo4j == 'true' }}
    timeout-minutes: 30
    strategy:
      matrix:
        os: [ ubuntu-22.04, windows-2022 ]
        include:
          - { os: ubuntu-22.04, platform: linux }
          - { os: windows-2022, platform: windows }
    runs-on: ${{ matrix.os }}
    name: neo4j/${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
      - uses: ./.github/actions/common
        with:
          build-cache: read-only
          maven-cache: read-only
          test-artifact-name: neo4j-${{ matrix.platform }}
          free-space: true
          run: |
            mvn --version
            mvn ${MVN_ARGS} build-cache:go-offline
            mvn ${MVN_ARGS} \
              -Dorg.slf4j.simpleLogger.showThreadName=true \
              -Dsurefire.reportNameSuffix=${{ matrix.platform }} \
              -pl neo4j \
              -am \
              -Pexamples,tests,spotbugs,javadoc \
              verify

  hashicorp_vault:
    needs: [ prime-build, changes ]
    if: ${{ needs.changes.outputs.hashicorp_vault == 'true' }}
    timeout-minutes: 45
    strategy:
      matrix:
        os: [ ubuntu-22.04, windows-2022 ]
        include:
          - { os: ubuntu-22.04, platform: linux }
          - { os: windows-2022, platform: windows }
    runs-on: ${{ matrix.os }}
    name: hashicorp-vault/${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
      - uses: ./.github/actions/common
        with:
          build-cache: read-only
          maven-cache: read-only
          test-artifact-name: hashicorp-vault-${{ matrix.platform }}
          free-space: true
          run: |
            mvn --version
            mvn ${MVN_ARGS} build-cache:go-offline
            mvn ${MVN_ARGS} \
              -Dorg.slf4j.simpleLogger.showThreadName=true \
              -Dsurefire.reportNameSuffix=${{ matrix.platform }} \
              -pl hashicorp-vault \
              -am \
              -Pexamples,tests,spotbugs,javadoc \
              verify

  oci_v3:
    needs: [ prime-build, changes ]
    if: ${{ needs.changes.outputs.oci_v3 == 'true' }}
    timeout-minutes: 45
    strategy:
      matrix:
        os: [ ubuntu-22.04, windows-2022 ]
        include:
          - { os: ubuntu-22.04, platform: linux }
          - { os: windows-2022, platform: windows }
    runs-on: ${{ matrix.os }}
    name: oci-v3/${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
      - uses: ./.github/actions/common
        with:
          build-cache: read-only
          maven-cache: read-only
          test-artifact-name: oci-v3-${{ matrix.platform }}
          free-space: true
          run: |
            mvn --version
            mvn ${MVN_ARGS} build-cache:go-offline
            mvn ${MVN_ARGS} \
              -Dorg.slf4j.simpleLogger.showThreadName=true \
              -Dsurefire.reportNameSuffix=${{ matrix.platform }} \
              -pl oci-v3 \
              -am \
              -Pexamples,tests,spotbugs,javadoc \
              verify

  langchain4j:
    needs: [ prime-build, changes ]
    if: ${{ needs.changes.outputs.lc4j == 'true' }}
    timeout-minutes: 30
    strategy:
      matrix:
        os: [ ubuntu-22.04, windows-2022 ]
        include:
          - { os: ubuntu-22.04, platform: linux }
          - { os: windows-2022, platform: windows }
    runs-on: ${{ matrix.os }}
    name: langchain4j/${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
      - uses: ./.github/actions/common
        with:
          build-cache: read-only
          maven-cache: read-only
          test-artifact-name: langchain4j-${{ matrix.platform }}
          free-space: true
          run: |
            mvn --version
            mvn ${MVN_ARGS} io.helidon.build-tools:helidon-build-cache-maven-plugin:4.0.26:go-offline
            mvn ${MVN_ARGS} \
              -Dorg.slf4j.simpleLogger.showThreadName=true \
              -Dsurefire.reportNameSuffix=${{ matrix.platform }} \
              -pl langchain4j \
              -am \
              -Pexamples,tests,spotbugs,javadoc \
              verify

  gate:
    if: ${{ always() }}
    runs-on: ubuntu-22.04
    needs: [ changes, prime-build, copyright, checkstyle, shellcheck, neo4j, langchain4j, hashicorp_vault, oci_v3 ]
    steps:
      - shell: bash
        run: |
          set -euo pipefail

          for result in \
            "${{ needs.changes.result }}" \
            "${{ needs.prime-build.result }}" \
            "${{ needs.copyright.result }}" \
            "${{ needs.checkstyle.result }}" \
            "${{ needs.shellcheck.result }}" \
            "${{ needs.neo4j.result }}" \
            "${{ needs.hashicorp_vault.result }}" \
            "${{ needs.langchain4j.result }}" \
            "${{ needs.oci_v3.result }}"; do
            if [ "${result}" != "success" ] && [ "${result}" != "skipped" ]; then
              exit 1
            fi
          done

          echo OK
